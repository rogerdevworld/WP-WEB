services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=warnfood_db
      - POSTGRES_USER=warnfood_admin
      - POSTGRES_PASSWORD=warnfood_secret_key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warnfood_admin -d warnfood_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ./django_backend:/app
    environment:
      - DEBUG=1
      - DB_NAME=warnfood_db
      - DB_USER=warnfood_admin
      - DB_PASSWORD=warnfood_secret_key
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
